name: Build and Push to GHCR

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convert owner to lowercase
        id: vars
        run: |
          echo "LOWER_OWNER=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.LOWER_OWNER }}/ghidra-server:latest
            ghcr.io/${{ steps.vars.outputs.LOWER_OWNER }}/ghidra-server:${{ github.sha }}
